server:
  port: 8080

spring:
  application:
    name: customer-agent
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-key-here}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.3
    chat:
      memory:
        type: redis
        redis:
          key-prefix: "cs:mem:"
          ttl: 30m
        max-messages: 10
    vectorstore:
      pgvector:
        dimensions: 1536
        schema: public
        table: knowledge_embeddings
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

resilience4j:
  circuitbreaker:
    instances:
      ai-chat:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus